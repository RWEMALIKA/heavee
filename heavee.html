
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Customer Feedback - All Themes</title>
    <style>
        /* ==================== CORE STYLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .feedback-form {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(15px);
            transition: all 0.5s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .rating-stars {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .rating-stars input {
            display: none;
        }

        .rating-stars label {
            font-size: 32px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }

        .rating-stars input:checked ~ label,
        .rating-stars label:hover,
        .rating-stars label:hover ~ label {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.1);
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .btn-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            margin: -12px 0 0 -12px;
            border: 3px solid transparent;
            border-top-color: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-message, .error-message {
            margin-top: 25px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-weight: 500;
        }

        .success-message {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #c3e6cb;
            animation: slideIn 0.5s ease;
        }

        .error-message {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }

        /* ==================== THEME SWITCHER ==================== */
        .theme-switcher {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .theme-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* ==================== THEMES ==================== */
        /* THEME 1: Modern Gradient */
        body.theme-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body.theme-1 .submit-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        /* THEME 2: Neon Glow */
        body.theme-2 { 
            background: #0a0a0a; 
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
        }
        body.theme-2 .feedback-form {
            background: rgba(15,15,25,0.95);
            box-shadow: 0 0 30px rgba(120,119,198,0.4), 0 20px 40px rgba(0,0,0,0.5);
            color: white;
        }
        body.theme-2 input, body.theme-2 textarea {
            background: rgba(30,30,50,0.8);
            border-color: rgba(120,119,198,0.5);
            color: white;
        }
        body.theme-2 .submit-btn { 
            background: linear-gradient(45deg, #ff006e, #8338ec, #3a86ff);
            box-shadow: 0 0 25px rgba(255,0,110,0.6);
        }
        body.theme-2 label { color: white; }

        /* THEME 3: Citrus Fresh */
        body.theme-3 { background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 50%, #ff7675 100%); }
        body.theme-3 .submit-btn { background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%); }

        /* THEME 4: Ocean Blue */
        body.theme-4 { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 50%, #6c5ce7 100%); }
        body.theme-4 .submit-btn { background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); }

        /* THEME 5: Fire */
        body.theme-5 { background: linear-gradient(45deg, #ff6b6b 0%, #feca57 25%, #ff9ff3 50%, #54a0ff 100%); }
        body.theme-5 .submit-btn { background: linear-gradient(45deg, #ff4757 0%, #ff6b7a 100%); }

        /* THEME 6: Luxury Gold */
        body.theme-6 { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #d4af37 100%); }
        body.theme-6 .submit-btn { 
            background: linear-gradient(45deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        /* THEME 7: Nature Green */
        body.theme-7 { background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 50%, #ffd3a5 100%); }
        body.theme-7 .submit-btn { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); }

        /* THEME 8: Dark Corporate */
        body.theme-8 { background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #1a252f 100%); }
        body.theme-8 .feedback-form { background: rgba(44,62,80,0.95); color: white; }
        body.theme-8 input, body.theme-8 textarea { 
            background: rgba(52,73,94,0.8); 
            border-color: rgba(52,152,219,0.5);
            color: white;
        }
        body.theme-8 .submit-btn { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        body.theme-8 label { color: white; }

        /* THEME 9: Candy Pink */
        body.theme-9 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%); }
        body.theme-9 .submit-btn { background: linear-gradient(135deg, #ff7675 0%, #fd79a8 100%); }

        /* THEME 10: Purple Haze */
        body.theme-10 { background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 50%, #fd79a8 100%); }
        body.theme-10 .submit-btn { background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%); }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .feedback-form { padding: 30px 25px; }
            .header h1 { font-size: 24px; }
            .theme-switcher { top: 15px; right: 15px; }
            .theme-btn { width: 45px; height: 45px; font-size: 11px; }
        }

        /* Admin Panel */
        .admin-panel {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .feedback-item {
            border: 1px solid #eee;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .feedback-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="theme-1">
    <!-- THEME SWITCHER -->
    <div class="theme-switcher">
        <button class="theme-btn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="setTheme(1)">1</button>
        <button class="theme-btn" style="background: linear-gradient(45deg, #ff006e, #8338ec);" onclick="setTheme(2)">2✨</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);" onclick="setTheme(3)">3🍋</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);" onclick="setTheme(4)">4🌊</button>
        <button class="theme-btn" style="background: linear-gradient(45deg, #ff4757 0%, #ff6b7a 100%);" onclick="setTheme(5)">5🔥</button>
        <button class="theme-btn" style="background: linear-gradient(45deg, #ffd700 0%, #ffed4e 100%); color:#1a1a1a;" onclick="setTheme(6)">6💎</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);" onclick="setTheme(7)">7🌳</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);" onclick="setTheme(8)">8💼</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #ff7675 0%, #fd79a8 100%);" onclick="setTheme(9)">9🍭</button>
        <button class="theme-btn" style="background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);" onclick="setTheme(10)">10💜</button>
    </div>

    <div class="container">
        <div class="feedback-form" id="formContainer">
            <div class="header">
                <h1>📝 Customer Feedback</h1>
                <p>We value your opinion! Please share your suggestions.</p>
            </div>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="name">👤 Name (Optional)</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label for="email">📧 Email (Optional)</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label>How satisfied are you? ⭐</label>
                    <div class="rating-stars">
                        <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Excellent">★</label>
                        <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Good">★</label>
                        <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Average">★</label>
                        <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Poor">★</label>
                        <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Very Poor">★</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="suggestion">💭 Your Feedback/Suggestion</label>
                    <textarea id="suggestion" name="suggestion" placeholder="Tell us what you loved or how we can improve..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <span>✨ Send Feedback</span>
                    <div class="btn-loader" id="btnLoader"></div>
                </button>
            </form>
            
            <div id="successMessage" class="success-message hidden">
                <h3>🎉 Thank You!</h3>
                <p>Your feedback has been saved successfully! We'll review it soon.</p>
            </div>
            
            <div id="errorMessage" class="error-message hidden"></div>
        </div>
    </div>

    <script>
        // ==================== THEME SWITCHER ====================
        function setTheme(num) {
            document.body.className = `theme-${num}`;
            localStorage.setItem('selectedTheme', num);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('selectedTheme') || '1';
        setTheme(savedTheme);

        // ====================
